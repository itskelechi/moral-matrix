<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MORAL MATRIX</title>
    <style>
        :root {
            --mustard: #E1AD01;
            --burnt-orange: #CC5500;
            --avocado: #568203;
            --cream: #F5E6BE;
            --brown: #3E2723;
        }

        body {
            background-color: var(--brown);
            background-image: radial-gradient(var(--burnt-orange) 1px, transparent 0);
            background-size: 40px 40px;
            font-family: 'Arial Black', Gadget, sans-serif;
            color: var(--brown);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background-color: var(--cream);
            width: 90%;
            max-width: 800px;
            border: 15px solid var(--mustard);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 20px 20px 0px var(--burnt-orange);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 3.2rem;
            color: var(--burnt-orange);
            text-transform: uppercase;
            margin: 0;
            text-shadow: 3px 3px 0 var(--mustard);
        }

        .goodwill-meter {
            background: var(--brown);
            color: var(--mustard);
            padding: 10px 20px;
            font-size: 1.8rem;
            display: inline-block;
            border-radius: 10px;
            margin: 15px 0;
            border: 4px dashed var(--avocado);
        }

        .screen { display: none; }
        .active { display: block; animation: popIn 0.4s ease-out; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: var(--avocado);
            color: var(--cream);
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 6px solid #3d5c02;
            transition: 0.1s;
            text-transform: uppercase;
        }

        button:hover { background-color: var(--mustard); border-bottom-color: #b08d01; }
        button:active { transform: translateY(3px); border-bottom-width: 2px; }

        .chance-card {
            background: white;
            border: 8px solid var(--burnt-orange);
            padding: 20px;
            margin: 20px 0;
            transform: rotate(-2deg);
            box-shadow: 10px 10px 0 rgba(0,0,0,0.2);
        }

        #chance-title { color: var(--burnt-orange); font-size: 1.5rem; margin-bottom: 5px; }

        .field-icon { font-size: 2.5rem; display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Moral Matrix</h1>
    <div class="goodwill-meter">GOODWILL: <span id="score">0</span></div>

    <div id="setup-screen" class="screen active">
        <h2>PICK YOUR SECTOR, CONTESTANT!</h2>
        <p>Where will you make your mark in ITEC?</p>
        <div class="grid">
            <button onclick="startGame('Healthcare')"><span class="field-icon">🏥</span>Healthcare</button>
            <button onclick="startGame('Corporation')"><span class="field-icon">🏢</span>Corporation</button>
            <button onclick="startGame('Government')"><span class="field-icon">🏛️</span>Government</button>
            <button onclick="startGame('Startup')"><span class="field-icon">🚀</span>Startup</button>
        </div>
    </div>

    <div id="dilemma-screen" class="screen">
        <h2 id="field-title">FIELD NAME</h2>
        <div id="reward-announcement" style="color: var(--avocado); margin-bottom: 15px;"></div>
        <p id="dilemma-text" class="result-text">Dilemma text goes here...</p>
        <div id="choices-container">
            </div>
    </div>

    <div id="chance-screen" class="screen">
        <div class="chance-card">
            <h3 id="chance-title">CHANCE CARD!</h3>
            <p id="chance-text" style="font-size: 1.2rem;"></p>
            <p id="chance-impact" style="font-weight: bold; color: var(--avocado);"></p>
        </div>
        <button onclick="showFinalResult()">SEE TOTAL IMPACT</button>
    </div>

    <div id="result-screen" class="screen">
        <h2 id="outcome-title">ROUND OVER!</h2>
        <p id="outcome-text" style="font-size: 1.4rem;"></p>
        <button onclick="resetGame()">PLAY ANOTHER ROUND?</button>
    </div>
</div>

<script>
    let score = 0;
    let roundLog = "";

    const chanceCards = [
        { text: "Server Outage! You worked 48 hours straight to fix it manually.", impact: 15, msg: "GROOVY DEV: +15 Goodwill for dedication." },
        { text: "Database Leak! A junior dev pushed an API key to GitHub.", impact: -25, msg: "TOTAL BUMMER: -25 Goodwill for the security breach." },
        { text: "Viral Open Source! Your side project goes viral on Reddit.", impact: 30, msg: "OUTTA SIGHT: +30 Goodwill for community spirit." },
        { text: "StackOverflow is Down! You have no idea how to code anymore.", impact: -10, msg: "BUMMER: -10 Goodwill for lost productivity." }
    ];

     const dilemmas = {
        'Healthcare': {
            bonus: 60,
            bonusMsg: "PUBLIC SERVICE BONUS! Starting with +50 Goodwill.",
            text: "Your diagnostic AI identifies a rare disease, but the patient's insurance won't cover the life-saving treatment. Do you 'tweak' the AI logs to suggest a covered (but less accurate) diagnosis to get them the meds?",
            choices: [
                { text: "Hack the logs for the patient.", impact: 20, msg: "The patient lives! But you've compromised data integrity. +20 Goodwill." },
                { text: "Follow the protocol.", impact: -30, msg: "Data remains pure, but the patient suffers. -30 Goodwill." }
            ]
        },
        'Corporation': {
            bonus: 10,
            bonusMsg: "CORPORATE SHILL! Starting with +10 Goodwill.",
            text: "You discover your company's new 'Privacy Pro' software is actually scraping user clipboards for marketing data. Reporting it might cost you your yearly bonus.",
            choices: [
                { text: "Leak it to a tech blog.", impact: 40, msg: "You're fired, but a hero to millions. +40 Goodwill." },
                { text: "Stay quiet and take the bonus.", impact: -50, msg: "You've got a new car, but lost your soul. -50 Goodwill." }
            ]
        },
        'Government': {
            bonus: 50,
            bonusMsg: "CIVIC DUTY! Starting with +60 Goodwill.",
            text: "The city wants to implement facial recognition in low-income neighborhoods to 'reduce crime,' but the algorithm has a 15% false-positive rate for minorities.",
            choices: [
                { text: "Refuse to deploy the update.", impact: 50, msg: "You protected civil liberties! +50 Goodwill." },
                { text: "Deploy as requested by the Mayor.", impact: -60, msg: "Innocent people are being detained. -60 Goodwill." }
            ]
        },
        'Startup': {
            bonus: 25,
            bonusMsg: "AGILE START! Starting with +25 Goodwill.",
            text: "Your 'Uber for Dog Walking' app is failing. To stay afloat, you can sell your users' location history to a 3rd party data broker without telling them.",
            choices: [
                { text: "Sell the data to save the jobs.", impact: -40, msg: "The company lives another day, but privacy is dead. -40 Goodwill." },
                { text: "Shut down the company honestly.", impact: 30, msg: "Everyone is unemployed, but your integrity is intact. +30 Goodwill." }
            ]
        }
    };


    function startGame(field) {
        const d = dilemmas[field];
        score = d.bonus;
        document.getElementById('score').innerText = score;
        document.getElementById('field-title').innerText = field.toUpperCase();
        document.getElementById('dilemma-text').innerText = d.text;
        
        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        d.choices.forEach(c => {
            const b = document.createElement('button');
            b.style.width = "100%"; b.style.marginBottom = "10px";
            b.innerText = c.t;
            b.onclick = () => handleChoice(c);
            container.appendChild(b);
        });
        showScreen('dilemma-screen');
    }

    function handleChoice(choice) {
        updateScore(choice.impact);
        roundLog = choice.m;
        document.getElementById('score').innerText = score;
        
        // Trigger Chance Card
        const card = chanceCards[Math.floor(Math.random() * chanceCards.length)];
        updateScore(card.impact);
        document.getElementById('chance-text').innerText = card.text;
        document.getElementById('chance-impact').innerText = card.msg;
        showScreen('chance-screen');
    }

    function showFinalResult() {
        document.getElementById('score').innerText = score;
        document.getElementById('outcome-text').innerText = roundLog + " Final Goodwill score: " + score;
        showScreen('result-screen');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateScore(points) {
        score += points;
        scoreEl.innerText = score;
    }
</script>
</body>
</html>
